<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Image Classifier Pro</title>
    <script
      crossorigin
      src="https://unpkg.com/react@18/umd/react.production.min.js"
    ></script>
    <script
      crossorigin
      src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"
    ></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        --secondary-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        --success-gradient: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        --card-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        --hover-shadow: 0 15px 50px rgba(0, 0, 0, 0.15);
      }

      body {
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 20px;
        position: relative;
        overflow-x: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        top: -50%;
        right: -50%;
        width: 200%;
        height: 200%;
        background: radial-gradient(
          circle,
          rgba(255, 255, 255, 0.1) 0%,
          transparent 70%
        );
        animation: rotate 30s linear infinite;
        pointer-events: none;
      }

      @keyframes rotate {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      #root {
        position: relative;
        z-index: 1;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
      }

      .header {
        text-align: center;
        margin-bottom: 40px;
        animation: fadeInDown 0.6s ease-out;
      }

      @keyframes fadeInDown {
        from {
          opacity: 0;
          transform: translateY(-30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .header h1 {
        color: white;
        font-size: 3em;
        font-weight: 800;
        margin-bottom: 10px;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
      }

      .header p {
        color: rgba(255, 255, 255, 0.9);
        font-size: 1.2em;
        font-weight: 300;
      }

      .main-card {
        background: white;
        border-radius: 24px;
        padding: 40px;
        box-shadow: var(--card-shadow);
        animation: fadeInUp 0.6s ease-out;
        backdrop-filter: blur(10px);
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .info-banner {
        background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
        padding: 20px;
        border-radius: 16px;
        margin-bottom: 30px;
        display: flex;
        align-items: center;
        gap: 15px;
      }

      .info-banner i {
        font-size: 2em;
        color: #1976d2;
      }

      .info-banner-text {
        flex: 1;
      }

      .info-banner h3 {
        color: #1565c0;
        margin-bottom: 5px;
        font-size: 1.1em;
      }

      .info-banner p {
        color: #1976d2;
        font-size: 0.95em;
      }

      .upload-section {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-bottom: 30px;
      }

      .upload-btn {
        padding: 20px;
        border: none;
        border-radius: 16px;
        font-size: 1.1em;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        position: relative;
        overflow: hidden;
      }

      .upload-btn::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(255, 255, 255, 0.1);
        transform: translateX(-100%);
        transition: transform 0.3s ease;
      }

      .upload-btn:hover::before {
        transform: translateX(0);
      }

      .upload-btn i {
        font-size: 2.5em;
      }

      .upload-btn-primary {
        background: var(--primary-gradient);
        color: white;
      }

      .upload-btn-secondary {
        background: var(--secondary-gradient);
        color: white;
      }

      .upload-btn:hover {
        transform: translateY(-3px);
        box-shadow: var(--hover-shadow);
      }

      .upload-btn:active {
        transform: translateY(-1px);
      }

      .upload-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }

      .preview-section {
        margin: 30px 0;
        text-align: center;
        min-height: 400px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f8f9fa;
        border-radius: 16px;
        position: relative;
        overflow: hidden;
      }

      .preview-image {
        max-width: 100%;
        max-height: 400px;
        border-radius: 12px;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.15);
        animation: zoomIn 0.4s ease-out;
      }

      @keyframes zoomIn {
        from {
          opacity: 0;
          transform: scale(0.8);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      .video-preview {
        max-width: 100%;
        max-height: 400px;
        border-radius: 12px;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.15);
      }

      .camera-controls {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 15px;
        z-index: 10;
      }

      .camera-btn {
        padding: 15px 30px;
        border: none;
        border-radius: 50px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        gap: 10px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      }

      .camera-btn-capture {
        background: white;
        color: #667eea;
      }

      .camera-btn-close {
        background: rgba(0, 0, 0, 0.7);
        color: white;
      }

      .camera-btn:hover {
        transform: scale(1.05);
      }

      .empty-state {
        text-align: center;
        padding: 60px 20px;
      }

      .empty-state i {
        font-size: 4em;
        color: #ccc;
        margin-bottom: 20px;
      }

      .empty-state h3 {
        color: #666;
        margin-bottom: 10px;
      }

      .empty-state p {
        color: #999;
      }

      .loading-overlay {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(255, 255, 255, 0.95);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        border-radius: 16px;
        z-index: 100;
      }

      .spinner {
        width: 60px;
        height: 60px;
        border: 5px solid #f3f3f3;
        border-top: 5px solid #667eea;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      .loading-text {
        margin-top: 20px;
        color: #667eea;
        font-weight: 600;
        font-size: 1.1em;
      }

      .results-section {
        margin-top: 30px;
        animation: fadeInUp 0.5s ease-out;
      }

      .results-header {
        text-align: center;
        margin-bottom: 25px;
      }

      .results-header h2 {
        color: #333;
        font-size: 2em;
        margin-bottom: 10px;
      }

      .results-header p {
        color: #666;
        font-size: 1em;
      }

      .predictions-grid {
        display: grid;
        gap: 15px;
      }

      .prediction-card {
        background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        padding: 20px;
        border-radius: 16px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
      }

      .prediction-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 4px;
        height: 100%;
        background: var(--primary-gradient);
        transform: scaleY(0);
        transition: transform 0.3s ease;
      }

      .prediction-card:hover {
        transform: translateX(8px);
      }

      .prediction-card:hover::before {
        transform: scaleY(1);
      }

      .prediction-card.top {
        background: var(--primary-gradient);
        color: white;
        font-size: 1.1em;
        box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
      }

      .prediction-rank {
        font-size: 1.5em;
        font-weight: 800;
        opacity: 0.3;
        margin-right: 15px;
      }

      .prediction-info {
        flex: 1;
      }

      .prediction-class {
        font-weight: 700;
        margin-bottom: 5px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .prediction-class i {
        font-size: 0.9em;
      }

      .confidence-bar {
        height: 6px;
        background: rgba(255, 255, 255, 0.3);
        border-radius: 3px;
        overflow: hidden;
        margin-top: 8px;
      }

      .confidence-fill {
        height: 100%;
        background: white;
        border-radius: 3px;
        transition: width 0.6s ease;
      }

      .prediction-card:not(.top) .confidence-fill {
        background: var(--primary-gradient);
      }

      .prediction-percentage {
        background: rgba(255, 255, 255, 0.3);
        padding: 8px 20px;
        border-radius: 25px;
        font-weight: 700;
        font-size: 1.1em;
      }

      .prediction-card.top .prediction-percentage {
        background: rgba(255, 255, 255, 0.25);
      }

      .error-message {
        background: linear-gradient(135deg, #fee 0%, #fcc 100%);
        color: #c33;
        padding: 20px;
        border-radius: 16px;
        margin-top: 20px;
        text-align: center;
        display: flex;
        align-items: center;
        gap: 15px;
        animation: shake 0.5s ease-in-out;
      }

      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-10px);
        }
        75% {
          transform: translateX(10px);
        }
      }

      .error-message i {
        font-size: 2em;
      }

      .stats-section {
        margin-top: 30px;
        padding-top: 30px;
        border-top: 2px solid #f0f0f0;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
      }

      .stat-card {
        text-align: center;
        padding: 20px;
        background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
        border-radius: 12px;
      }

      .stat-value {
        font-size: 2em;
        font-weight: 800;
        color: #667eea;
        margin-bottom: 5px;
      }

      .stat-label {
        color: #666;
        font-size: 0.9em;
      }

      @media (max-width: 768px) {
        .header h1 {
          font-size: 2em;
        }

        .main-card {
          padding: 20px;
        }

        .upload-section {
          grid-template-columns: 1fr;
        }

        .predictions-grid {
          gap: 12px;
        }

        .prediction-card {
          padding: 15px;
        }

        .stats-section {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useRef, useEffect } = React;

      const API_URL = "http://localhost:5000";

      function App() {
        const [image, setImage] = useState(null);
        const [imagePreview, setImagePreview] = useState(null);
        const [predictions, setPredictions] = useState(null);
        const [loading, setLoading] = useState(false);
        const [error, setError] = useState(null);
        const [cameraActive, setCameraActive] = useState(false);
        const [stream, setStream] = useState(null);

        const fileInputRef = useRef(null);
        const videoRef = useRef(null);

        // Cleanup camera on unmount
        useEffect(() => {
          return () => {
            if (stream) {
              stream.getTracks().forEach((track) => track.stop());
            }
          };
        }, [stream]);

        const handleFileSelect = (event) => {
          const file = event.target.files[0];
          if (file) {
            setImage(file);
            setImagePreview(URL.createObjectURL(file));
            setPredictions(null);
            setError(null);
            classifyImage(file);
          }
        };

        const handleUploadClick = () => {
          fileInputRef.current.click();
        };

        const handleCameraClick = async () => {
          try {
            const mediaStream = await navigator.mediaDevices.getUserMedia({
              video: { facingMode: "environment", width: 1280, height: 720 },
            });

            setStream(mediaStream);
            setCameraActive(true);
            setPredictions(null);
            setError(null);

            if (videoRef.current) {
              videoRef.current.srcObject = mediaStream;
            }
          } catch (err) {
            setError(`Camera access denied: ${err.message}`);
          }
        };

        const handleCapture = () => {
          const video = videoRef.current;
          const canvas = document.createElement("canvas");
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;

          const ctx = canvas.getContext("2d");
          ctx.drawImage(video, 0, 0);

          canvas.toBlob(
            (blob) => {
              const imageUrl = URL.createObjectURL(blob);
              setImagePreview(imageUrl);
              setImage(blob);
              closeCamera();

              // Convert to base64 and classify
              canvas.toBlob((blob) => {
                const reader = new FileReader();
                reader.onloadend = () => {
                  classifyBase64Image(reader.result);
                };
                reader.readAsDataURL(blob);
              });
            },
            "image/jpeg",
            0.95,
          );
        };

        const closeCamera = () => {
          if (stream) {
            stream.getTracks().forEach((track) => track.stop());
            setStream(null);
          }
          setCameraActive(false);
        };

        const classifyImage = async (file) => {
          setLoading(true);
          setError(null);

          const formData = new FormData();
          formData.append("image", file);

          try {
            const response = await fetch(`${API_URL}/api/predict`, {
              method: "POST",
              body: formData,
            });

            const data = await response.json();
            console.log("response:", data);
            if (data.success) {
              setPredictions(data.predictions);
            } else {
              setError(data.error || "Classification failed");
            }
          } catch (err) {
            setError(
              "Failed to connect to server. Please ensure the backend is running on port 5000.",
            );
          } finally {
            setLoading(false);
          }
        };

        const classifyBase64Image = async (base64Data) => {
          setLoading(true);
          setError(null);

          try {
            const response = await fetch(`${API_URL}/api/predict-base64`, {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({ imageData: base64Data }),
            });

            const data = await response.json();

            if (data.success) {
              setPredictions(data.predictions);
            } else {
              setError(data.error || "Classification failed");
            }
          } catch (err) {
            setError(
              "Failed to connect to server. Please ensure the backend is running on port 5000.",
            );
          } finally {
            setLoading(false);
          }
        };

        return (
          <div className="container">
            <div className="header">
              <h1>
                <i className="fas fa-brain"></i> AI Image Classifier Pro
              </h1>
              <p>Powered by MobileNet v2 & TensorFlow.js</p>
            </div>

            <div className="main-card">
              <div className="info-banner">
                <i className="fas fa-info-circle"></i>
                <div className="info-banner-text">
                  <h3>Advanced AI Image Recognition</h3>
                  <p>
                    Upload or capture images to identify 1000+ object categories
                    with deep learning
                  </p>
                </div>
              </div>

              <div className="upload-section">
                <input
                  type="file"
                  ref={fileInputRef}
                  onChange={handleFileSelect}
                  accept="image/*"
                  style={{ display: "none" }}
                />
                <button
                  className="upload-btn upload-btn-primary"
                  onClick={handleUploadClick}
                  disabled={loading}
                >
                  <i className="fas fa-cloud-upload-alt"></i>
                  <span>Upload Image</span>
                </button>
                <button
                  className="upload-btn upload-btn-secondary"
                  onClick={handleCameraClick}
                  disabled={loading || cameraActive}
                >
                  <i className="fas fa-camera"></i>
                  <span>Use Camera</span>
                </button>
              </div>

              <div className="preview-section">
                {loading && (
                  <div className="loading-overlay">
                    <div className="spinner"></div>
                    <div className="loading-text">
                      <i className="fas fa-magic"></i> Analyzing image...
                    </div>
                  </div>
                )}

                {!cameraActive && !imagePreview && !loading && (
                  <div className="empty-state">
                    <i className="fas fa-image"></i>
                    <h3>No Image Selected</h3>
                    <p>Upload an image or capture one with your camera</p>
                  </div>
                )}

                {cameraActive && (
                  <>
                    <video
                      ref={videoRef}
                      autoPlay
                      playsInline
                      className="video-preview"
                    />
                    <div className="camera-controls">
                      <button
                        className="camera-btn camera-btn-capture"
                        onClick={handleCapture}
                      >
                        <i className="fas fa-camera"></i>
                        Capture
                      </button>
                      <button
                        className="camera-btn camera-btn-close"
                        onClick={closeCamera}
                      >
                        <i className="fas fa-times"></i>
                        Close
                      </button>
                    </div>
                  </>
                )}

                {!cameraActive && imagePreview && (
                  <img
                    src={imagePreview}
                    alt="Preview"
                    className="preview-image"
                  />
                )}
              </div>

              {error && (
                <div className="error-message">
                  <i className="fas fa-exclamation-triangle"></i>
                  <span>{error}</span>
                </div>
              )}

              {predictions && predictions.length > 0 && (
                <div className="results-section">
                  <div className="results-header">
                    <h2>
                      <i className="fas fa-chart-bar"></i> Classification
                      Results
                    </h2>
                    <p>Top predictions ranked by confidence</p>
                  </div>

                  <div className="predictions-grid">
                    {predictions.map((pred, index) => (
                      <div
                        key={index}
                        className={`prediction-card ${index === 0 ? "top" : ""}`}
                      >
                        <span className="prediction-rank">#{pred.rank}</span>
                        <div className="prediction-info">
                          <div className="prediction-class">
                            {index === 0 && <i className="fas fa-trophy"></i>}
                            {pred.class}
                          </div>
                          <div className="confidence-bar">
                            <div
                              className="confidence-fill"
                              style={{ width: `${pred.probability * 100}%` }}
                            ></div>
                          </div>
                        </div>
                        <span className="prediction-percentage">
                          {pred.percentage}
                        </span>
                      </div>
                    ))}
                  </div>

                  <div className="stats-section">
                    <div className="stat-card">
                      <div className="stat-value">
                        {predictions[0].percentage}
                      </div>
                      <div className="stat-label">Top Confidence</div>
                    </div>
                    <div className="stat-card">
                      <div className="stat-value">{predictions.length}</div>
                      <div className="stat-label">Predictions</div>
                    </div>
                    <div className="stat-card">
                      <div className="stat-value">MobileNet</div>
                      <div className="stat-label">Model Used</div>
                    </div>
                  </div>
                </div>
              )}
            </div>
          </div>
        );
      }

      ReactDOM.render(<App />, document.getElementById("root"));
    </script>
  </body>
</html>
